server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback — all unmatched routes serve index.html so React Router works
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets aggressively (React build uses content-hash filenames)
    location /static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Health check endpoint for Docker / Azure
    location /health {
        return 200 'ok';
        add_header Content-Type text/plain;
    }
}
