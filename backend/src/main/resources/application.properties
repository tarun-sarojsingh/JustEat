spring.application.name=justeat-backend

# --- Database ---
# By default this runs against a FILE-BASED H2 database (stored in ./data/justeat.mv.db)
# so the app works immediately with no setup, and data survives restarts.
# Set SPRING_PROFILES_ACTIVE=docker (done automatically in docker-compose.yml) to use
# real MySQL instead.
spring.datasource.url=jdbc:h2:file:./data/justeat;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# --- JWT ---
# In a real deployment this MUST come from an environment variable / secret store.
jwt.secret=${JWT_SECRET:this-is-a-demo-secret-key-for-the-justeat-trainee-assignment-change-me}
jwt.expiration-ms=86400000

# --- Swagger ---
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

server.port=8080
