spring.datasource.url=jdbc:mysql://mysql:3306/justeat?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=${MYSQL_USER:justeat}
spring.datasource.password=${MYSQL_PASSWORD:justeat}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.h2.console.enabled=false

# Allow the deployed frontend origin in Docker / production
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}
